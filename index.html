<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NARRAVOX</title>

<!-- ✅ Clean Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text x='8' y='48' font-size='42' font-family='Arial Black, Arial' font-weight='900' fill='white'>N</text><text x='30' y='48' font-size='42' font-family='Arial Black, Arial' font-weight='900' fill='%23f9d423'>V</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: linear-gradient(135deg, #4facfe, #f9d423);
  color:white;
  scroll-behavior:smooth;
}

/* Navbar */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.2);
}

header img{width:140px}

nav a{
  margin-left:25px;
  text-decoration:none;
  color:white;
  font-weight:500;
  transition:0.3s;
  position:relative;
}

nav a.active{
  color:#f9d423;
}

nav a.active::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-5px;
  width:100%;
  height:2px;
  background:#f9d423;
}

nav a:hover{
  color:#f9d423;
  text-shadow:0 0 10px #f9d423;
}

/* Hero */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:60px;
}

.hero span{
  color:#f9d423;
}

.hero p{
  margin-top:10px;
  font-size:20px;
}

.hero-img{
  margin-top:30px;
  width:250px;
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
}

/* Buttons */
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background: linear-gradient(45deg,#f9d423,#4facfe);
  color:white;
  cursor:pointer;
}

/* Sections */
section{
  padding:80px 50px;
  text-align:center;
}

.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card{
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px);
}

/* Form */
.contact-box{
  display:flex;
  flex-direction:column;
  gap:15px;
  max-width:400px;
  margin:auto;
}

input, textarea{
  padding:12px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
}

input::placeholder, textarea::placeholder{
  color:#555;
}

/* Loader */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f2027;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader-circle{
  width:60px;
  height:60px;
  border:6px solid rgba(255,255,255,0.2);
  border-top:6px solid #f9d423;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div id="loader">
  <div class="loader-circle"></div>
</div>

<header>
  <img src="logo.png">
  <nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>NARRA<span>VOX</span></h1>
  <p id="typing"></p>
  <button onclick="scrollToSection()">Get Started</button>
  <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" class="hero-img">
</section>

<section id="services">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Organic Social Media Growth</div>
    <div class="card">Content Strategy</div>
    <div class="card">Script Writing</div>
    <div class="card">Video Editing</div>
    <div class="card">Carousels</div>
    <div class="card">Account Management</div>
  </div>
</section>

<section id="about">
  <h2>What We Do</h2>
  <p>We manage your entire social media workflow from planning to posting.</p>
</section>

<section id="contact">
  <h2>Contact Us</h2>
  <form class="contact-box" action="https://formspree.io/f/mjgjbozp" method="POST">
    <input type="text" name="name" placeholder="Your Name">
    <input type="email" name="email" placeholder="Your Email">
    <textarea name="message" placeholder="Your Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<script>
// typing
const text = "your narrative voice";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 70);
  }
}
typing();

// scroll
function scrollToSection(){
  document.getElementById("services").scrollIntoView({behavior:"smooth"});
}

// loader
window.onload = () => {
  document.getElementById("loader").style.display = "none";
};
</script>

</body>
</html>
